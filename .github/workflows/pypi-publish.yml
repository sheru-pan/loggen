name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      target:
        description: 'Which index to publish to'
        required: true
        type: choice
        options:
          - testpypi
          - pypi
        default: testpypi

jobs:
  build:
    name: Build sdist and wheel
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tooling
        run: python -m pip install --upgrade pip build

      - name: Build distribution
        run: python -m build

      - name: Verify metadata
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish-testpypi:
    name: Publish to TestPyPI (pre-release tags or manual)
    needs: build
    if: |
      (github.event_name == 'workflow_dispatch' && inputs.target == 'testpypi') ||
      (github.event_name == 'push' &&
        (contains(github.ref_name, '-rc') ||
         contains(github.ref_name, '-alpha') ||
         contains(github.ref_name, '-beta')))
    runs-on: ubuntu-latest

    environment:
      name: testpypi
      url: https://test.pypi.org/project/loggen-cli/

    permissions:
      id-token: write   # required for trusted publishing (OIDC)

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: Publish to PyPI (stable tags or manual)
    needs: build
    if: |
      (github.event_name == 'workflow_dispatch' && inputs.target == 'pypi') ||
      (github.event_name == 'push' &&
        startsWith(github.ref_name, 'v') &&
        !contains(github.ref_name, '-'))
    runs-on: ubuntu-latest

    environment:
      name: pypi
      url: https://pypi.org/project/loggen-cli/

    permissions:
      id-token: write   # required for trusted publishing (OIDC)

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
