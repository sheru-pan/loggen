name: Build and publish Docker image

on:
  push:
    tags:
      - 'v*'           # Triggers on tags like v0.1.0, v1.2.3, v2.0.0-rc1
  workflow_dispatch:   # Allows manual trigger from the Actions tab

env:
  IMAGE_NAME: sheru/loggen
  PLATFORMS: linux/amd64,linux/arm64

jobs:
  build-and-push:
    name: Build and push multi-arch image
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU (for arm64 emulation)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            # On a tag push like v0.2.0, produces tags: 0.2.0, 0.2, 0, latest
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            # On manual dispatch, tags with the branch name (e.g. main)
            type=ref,event=branch
            # Also publish with v-prefix to match the tag form (e.g. v0.2.0)
            type=semver,pattern=v{{version}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: ${{ env.PLATFORMS }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Inspect published manifest
        run: docker buildx imagetools inspect ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
